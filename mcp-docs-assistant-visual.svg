<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MCP Docs Assistant</title>
  <desc id="desc">Capa visual do projeto MCP Docs Assistant com BM25, FastMCP e documentação markdown.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efe8dc"/>
      <stop offset="100%" stop-color="#ddd2c3"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#183a39"/>
      <stop offset="100%" stop-color="#0f2322"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="36" fill="url(#bg)"/>
  <rect x="46" y="46" width="1108" height="668" rx="30" fill="url(#panel)"/>

  <text x="92" y="124" fill="#d9f5eb" font-family="Avenir Next, Inter, sans-serif" font-size="24" font-weight="700" letter-spacing="3">MODEL CONTEXT PROTOCOL</text>
  <text x="92" y="206" fill="#ffffff" font-family="Avenir Next, Inter, sans-serif" font-size="62" font-weight="800">MCP Docs Assistant</text>
  <text x="92" y="260" fill="#b6d2ca" font-family="Avenir Next, Inter, sans-serif" font-size="28">Servidor read-only para consulta estruturada de documentação local</text>

  <g transform="translate(92 322)">
    <rect width="486" height="118" rx="24" fill="#f6f1e9"/>
    <text x="28" y="46" fill="#4f4238" font-family="Menlo, monospace" font-size="22">resource:</text>
    <text x="28" y="82" fill="#153b39" font-family="Menlo, monospace" font-size="28" font-weight="700">docs://catalog</text>

    <rect y="142" width="486" height="210" rx="24" fill="#f6f1e9"/>
    <text x="28" y="184" fill="#4f4238" font-family="Menlo, monospace" font-size="22">tools</text>
    <text x="28" y="228" fill="#153b39" font-family="Menlo, monospace" font-size="24">list_docs()</text>
    <text x="28" y="268" fill="#153b39" font-family="Menlo, monospace" font-size="24">search_docs(query, top_k)</text>
    <text x="28" y="308" fill="#153b39" font-family="Menlo, monospace" font-size="24">get_doc(doc_id)</text>
  </g>

  <g transform="translate(626 322)">
    <rect width="482" height="352" rx="24" fill="#102b2a" stroke="#3d645f" stroke-width="2"/>
    <text x="28" y="48" fill="#d9f5eb" font-family="Avenir Next, Inter, sans-serif" font-size="24" font-weight="700">Pipeline</text>
    <text x="28" y="102" fill="#ffffff" font-family="Avenir Next, Inter, sans-serif" font-size="28" font-weight="700">Markdown + frontmatter</text>
    <text x="28" y="144" fill="#b6d2ca" font-family="Avenir Next, Inter, sans-serif" font-size="24">metadados, tags e conteúdo</text>
    <text x="28" y="202" fill="#ffffff" font-family="Avenir Next, Inter, sans-serif" font-size="28" font-weight="700">BM25</text>
    <text x="28" y="244" fill="#b6d2ca" font-family="Avenir Next, Inter, sans-serif" font-size="24">busca lexical leve e explicável</text>
    <text x="28" y="302" fill="#ffffff" font-family="Avenir Next, Inter, sans-serif" font-size="28" font-weight="700">FastMCP</text>
    <text x="28" y="344" fill="#b6d2ca" font-family="Avenir Next, Inter, sans-serif" font-size="24">stdio, resources, tools e prompts</text>
  </g>
</svg>
